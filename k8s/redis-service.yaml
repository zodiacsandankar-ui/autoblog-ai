apiVersion: v1
kind: Service
metadata:
  name: autoblog-redis
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: autoblog-ai
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: cache
