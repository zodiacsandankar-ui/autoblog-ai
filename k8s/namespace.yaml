apiVersion: v1
kind: Namespace
metadata:
  name: autoblog
  labels:
    name: autoblog
    environment: production
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/part-of: autoblog-ai
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: autoblog-quota
  namespace: autoblog
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    persistentvolumeclaims: "5"
    pods: "30"
    services: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: autoblog-limits
  namespace: autoblog
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "200m"
        memory: "256Mi"
      type: Container
