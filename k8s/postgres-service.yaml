apiVersion: v1
kind: Service
metadata:
  name: autoblog-postgres
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: autoblog-ai
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
---
apiVersion: v1
kind: Service
metadata:
  name: autoblog-postgres-read
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: autoblog-ai
    role: read
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
---
apiVersion: v1
kind: Service
metadata:
  name: autoblog-postgres-write
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: autoblog-ai
    role: write
spec:
  type: ClusterIP
  clusterIP: None
  ports:
