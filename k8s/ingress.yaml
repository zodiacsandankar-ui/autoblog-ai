apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoblog-ingress
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: autoblog-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://autoblog.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Origin, Content-Type, Accept, Authorization, X-Api-Key"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
spec:
  tls:
    - hosts:
        - autoblog.ai
        - api.autoblog.ai
        - www.autoblog.ai
        - staging.autoblog.ai
      secretName: autoblog-tls
  rules:
    - host: autoblog.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoblog-web
                port:
                  number: 3000
    - host: www.autoblog.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoblog-web
                port:
                  number: 3000
    - host: api.autoblog.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoblog-api
                port:
                  number: 3001
    - host: staging.autoblog.ai
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: autoblog-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: autoblog-web
                port:
                  number: 3000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: autoblog-tls
  namespace: autoblog
spec:
  secretName: autoblog-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - autoblog.ai
    - www.autoblog.ai
    - api.autoblog.ai
    - staging.autoblog.ai
