apiVersion: v1
kind: ConfigMap
metadata:
  name: autoblog-config
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: autoblog-ai
data:
  API_PORT: "3001"
  API_HOST: "0.0.0.0"
  API_CORS_ORIGIN: "https://autoblog.ai"
  API_RATE_LIMIT_WINDOW_MS: "60000"
  API_RATE_LIMIT_MAX_REQUESTS: "100"
  API_RATE_LIMIT_AUTH_MAX_REQUESTS: "500"
  API_BODY_LIMIT: "10mb"
  API_LOG_LEVEL: "info"
  API_LOG_FORMAT: "json"
  WEB_PORT: "3000"
  WEB_HOST: "0.0.0.0"
  WEB_API_BASE_URL: "http://autoblog-api:3001"
  WEB_LOG_LEVEL: "info"
  DATABASE_HOST: "autoblog-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "autoblog"
  DATABASE_SSL_ENABLED: "true"
  DATABASE_POOL_MIN: "2"
  DATABASE_POOL_MAX: "20"
  DATABASE_IDLE_TIMEOUT_MS: "10000"
  DATABASE_CONNECTION_TIMEOUT_MS: "5000"
  REDIS_HOST: "autoblog-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_ENABLE_TLS: "false"
  REDIS_PREFIX: "autoblog:"
  NODE_ENV: "production"
  APP_NAME: "AutoBlog AI"
  APP_URL: "https://autoblog.ai"
  APP_TIMEZONE: "UTC"
  APP_LOCALE: "en"
  AI_PROVIDER: "openai"
  AI_MODEL: "gpt-4o"
  AI_MAX_TOKENS: "4096"
  AI_TEMPERATURE: "0.7"
  AI_TIMEOUT_MS: "30000"
  BLOG_MAX_TITLE_LENGTH: "200"
  BLOG_MAX_EXCERPT_LENGTH: "500"
  BLOG_DEFAULT_CONTENT_TYPE: "markdown"
  BLOG_IMAGE_GENERATION_ENABLED: "true"
  BLOG_SCHEDULER_CRON: "0 */6 * * *"
  BLOG_CACHE_TTL_SECONDS: "3600"
  STORAGE_PROVIDER: "s3"
  STORAGE_BUCKET: "autoblog-ai-content"
  STORAGE_REGION: "us-east-1"
  STORAGE_SSL_ENABLED: "true"
  STORAGE_ACL: "private"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  TRACING_ENABLED: "true"
  TRACING_SAMPLING_RATE: "0.1"
  HEALTH_CHECK_PATH: "/health"
  READINESS_CHECK_PATH: "/ready"
  LIVENESS_CHECK_PATH: "/live"
