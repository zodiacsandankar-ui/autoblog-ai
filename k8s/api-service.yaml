apiVersion: v1
kind: Service
metadata:
  name: autoblog-api
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: autoblog-ai
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: api
