apiVersion: v1
kind: Secret
metadata:
  name: autoblog-database-credentials
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: autoblog-ai
type: Opaque
stringData:
  DATABASE_USER: "autoblog"
  DATABASE_PASSWORD: ""  # Set via external secrets operator
---
apiVersion: v1
kind: Secret
metadata:
  name: autoblog-redis-credentials
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: autoblog-ai
type: Opaque
stringData:
  REDIS_PASSWORD: ""  # Set via external secrets operator
---
apiVersion: v1
kind: Secret
metadata:
  name: autoblog-api-keys
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: autoblog-ai
type: Opaque
stringData:
  AI_API_KEY: ""  # Set via external secrets operator
  JWT_SECRET: ""  # Set via external secrets operator
  JWT_REFRESH_SECRET: ""  # Set via external secrets operator
  SENTRY_DSN: ""  # Set via external secrets operator
  WEB_SESSION_SECRET: ""  # Set via external secrets operator
---
apiVersion: v1
kind: Secret
metadata:
  name: autoblog-storage-credentials
  namespace: autoblog
  labels:
    app.kubernetes.io/name: autoblog
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: autoblog-ai
type: Opaque
stringData:
  STORAGE_ACCESS_KEY_ID: ""  # Set via external secrets operator
  STORAGE_SECRET_ACCESS_KEY: ""  # Set via external secrets operator
---
# External Secrets reference for production vault integration
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: autoblog-external-secrets
  namespace: autoblog
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: autoblog-secret-store
    kind: SecretStore
  target:
    name: autoblog-secrets
    creationPolicy: Merge
  data:
    - secretKey: DATABASE_USER
      remoteRef:
        key: /autoblog/production/database
        property: username
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: /autoblog/production/database
        property: password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: /autoblog/production/redis
        property: password
    - secretKey: AI_API_KEY
      remoteRef:
        key: /autoblog/production/ai
        property: api_key
    - secretKey: JWT_SECRET
      remoteRef:
        key: /autoblog/production/jwt
        property: secret
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: /autoblog/production/jwt
        property: refresh_secret
    - secretKey: STORAGE_ACCESS_KEY_ID
      remoteRef:
        key: /autoblog/production/storage
        property: access_key_id
    - secretKey: STORAGE_SECRET_ACCESS_KEY
      remoteRef:
        key: /autoblog/production/storage
        property: secret_access_key
    - secretKey: SENTRY_DSN
      remoteRef:
        key: /autoblog/production/monitoring
        property: sentry_dsn
    - secretKey: WEB_SESSION_SECRET
      remoteRef:
        key: /autoblog/production/web
        property: session_secret
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: autoblog-secret-store
  namespace: autoblog
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: autoblog-sa
